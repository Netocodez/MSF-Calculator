<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSF CALCULATOR</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>ANSO REPORT GENERATOR</h1>
        <h2>Ensuring Real Time Quality and Consistent Data!</h2>

        <div class="date-picker-group">
            <!--<label for="startDate">Start Date:</label>
            <input type="date" id="startDate" name="startDate">-->
            <br>
            <label for="endDate">Select Reporting Period:</label>
            <input type="date" id="endDate" name="endDate">
        </div>
        
        <h2>Select ART Line List</h2>
        <input type="file" id="fileInput" accept=".xlsx,.xls" />
        <div id="uploadMessage"></div>

        <div class="button-group">
            <button id="fetchData">ART LINE LIST TO ART MSF</button>
            <!-- <button id="fetchIHVN">IHVN MSF Data Validation</button> -->
            <!-- <button id="fetchAHNI">IHVN Vs NDARS MSF Data Concurrence</button> -->
        </div>

        <div id="loading" class="hidden">Fetching and Analyzing data, please wait...</div>
        <div id="message"></div>

        <a id="downloadLinkgray" class="hidden" href="#" target="_blank">Download File</a>
    </div>

    <script>
        $(document).ready(function () {
            $("#fetchData").click(function () {
                const fileInput = $("#fileInput")[0];
                const file = fileInput.files[0];
                const startDate = $("#startDate").val();
                const endDate = $("#endDate").val();

                if (!file) {
                    $("#message").text("Please select an Excel file first.").addClass("errmessage");
                    return;
                }

                const allowedExtensions = /(\.xlsx|\.xls)$/i;
                if (!allowedExtensions.exec(file.name)) {
                    $("#message").text("Only Excel files (.xlsx, .xls) are allowed.").addClass("errmessage");
                    return;
                }

                const formData = new FormData();
                formData.append("file", file);
                formData.append("startDate", startDate);
                formData.append("endDate", endDate);

                $("#loading").removeClass("hidden");
                $("#message").text("");
                $("#uploadMessage").text("");

                $.ajax({
                    url: "/fetch",
                    type: "POST",
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function (response) {
                        $("#loading").addClass("hidden");
                        $("#message").text(response.message).addClass("message");

                        if (response.download_url) {
                            $("#downloadLinkgray")
                                .attr("href", response.download_url)
                                .removeClass("hidden")
                                .removeClass("downloadLinkgray")
                                .addClass("downloadLink");
                        }
                    },
                    error: function () {
                        $("#loading").addClass("hidden");
                        $("#message").text("Error fetching and processing data.").addClass("errmessage");
                    }
                });
            });
        });
    </script>
</body>
</html>
